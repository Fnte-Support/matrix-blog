  <style>
    :root {
      --coffee-dark: #2C1810;
      --coffee-mid: #6B4226;
      --coffee-light: #C07A3E;
      --coffee-cream: #F5EDE0;
      --coffee-bg: #FDFBF8;
      --gray-light: #f0ede8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--coffee-bg); color: var(--coffee-dark); line-height: 1.6; }

    /* ── Header ── */
    header { background: var(--coffee-dark); color: #fff; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .site-logo { font-size: 1.3rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.5px; }
    .site-logo span { color: var(--coffee-light); }
    .site-desc { font-size: 0.8rem; color: rgba(255,255,255,0.5); display: none; }
    @media (min-width: 600px) { .site-desc { display: block; } }

    /* ── Category Nav ── */
    /* cat-nav 外框（桌機：右側漸層 + 橫向捲動；手機：隱藏，改顯示漢堡選單） */
    .cat-nav { background: var(--coffee-mid); position: relative; }
    .cat-nav::after { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 28px; background: linear-gradient(to right, transparent, var(--coffee-mid) 80%); pointer-events: none; z-index: 2; }
    .cat-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; padding: 0 1.5rem; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .cat-nav-inner::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 0.75rem 1.2rem; color: rgba(255,255,255,0.75); font-size: 0.9rem; font-weight: 500; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
    /* 漢堡選單 toggle：手機才顯示 */
    .cat-menu-toggle { display: none; }
    .cat-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .cat-btn.active { color: #fff; border-bottom-color: var(--coffee-light); font-weight: 600; }

    /* ── Search Bar ── */
    .search-bar { max-width: 1200px; margin: 1.5rem auto 0; padding: 0 1.5rem; }
    .search-wrap { position: relative; max-width: 560px; margin: 0 auto; }
    .search-wrap input { width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border: 2px solid var(--gray-light); border-radius: 12px; font-size: 1rem; background: #fff; outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: var(--coffee-light); }
    .search-wrap .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.5; }
    #search-results-count { text-align: center; font-size: 0.85rem; color: #888; margin-top: 0.5rem; min-height: 1.2em; }

    /* ── Main Content ── */
    main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
    .section-title { font-size: 1.1rem; font-weight: 600; color: var(--coffee-mid); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--gray-light); display: flex; align-items: center; justify-content: space-between; }
    .section-title .count { font-weight: 400; color: #aaa; font-size: 0.85rem; }

    /* ── Article Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }

    /* ── Pagination ── */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 2.5rem; flex-wrap: wrap; }
    .page-btn { min-width: 40px; height: 40px; border: 2px solid var(--gray-light); background: #fff; border-radius: 10px; font-size: 0.9rem; font-weight: 600; color: var(--coffee-mid); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; padding: 0 0.5rem; }
    .page-btn:hover { border-color: var(--coffee-light); color: var(--coffee-light); }
    .page-btn.active { background: var(--coffee-dark); color: #fff; border-color: var(--coffee-dark); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-ellipsis { color: #aaa; font-size: 0.9rem; padding: 0 0.25rem; }

    /* ── Article Card ── */
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); transition: box-shadow .2s, transform .2s; display: flex; flex-direction: column; position: relative; }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); transform: translateY(-2px); }
    .card-img-wrap { position: relative; overflow: hidden; }
    .card-img-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; transition: transform .3s; }
    .card:hover .card-img-wrap img { transform: scale(1.03); }
    .ext-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.65); color: #fff; font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px; display: flex; align-items: center; gap: 3px; backdrop-filter: blur(4px); }
    .card-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
    .card .cat-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .card .cat-tag { display: inline-block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .cat-news { background: #FFF3E0; color: #E65100; }
    .cat-knowledge { background: #E8F5E9; color: #2E7D32; }
    .cat-events { background: #E3F2FD; color: #1565C0; }
    .cat-map { background: #F3E5F5; color: #6A1B9A; }
    .cat-kol { background: #FFEBEE; color: #C62828; }
    .cat-cbtj { background: #FFF8E1; color: #F57F17; }
    .card-body h2 { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; flex: 1; }
    .card-body h2 a { color: var(--coffee-dark); text-decoration: none; }
    .card-body h2 a:hover { color: var(--coffee-light); }
    /* Tag row on card */
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .card-tag { font-size: 0.68rem; background: var(--gray-light); color: #888; padding: 2px 7px; border-radius: 20px; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-top: auto; padding-top: 0.5rem; border-top: 1px solid var(--gray-light); }
    .card-empty { grid-column: 1/-1; text-align: center; padding: 4rem 0; color: #bbb; }
    .card-empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ── Footer ── */
    footer { background: var(--coffee-dark); color: rgba(255,255,255,0.5); padding: 3rem 1.5rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    @media (max-width: 640px) { .footer-inner { grid-template-columns: 1fr; } }
    .footer-col h4 { color: rgba(255,255,255,0.8); font-size: 0.9rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: 1px; }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 0.5rem; }
    .footer-col a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; transition: color .2s; }
    .footer-col a:hover { color: var(--coffee-light); }
    .footer-bottom { max-width: 1200px; margin: 2rem auto 0; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 0.8rem; }
    .footer-bottom a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .footer-bottom a:hover { color: rgba(255,255,255,0.7); }
    .footer-links { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .header-inner { height: 56px; }
      .site-logo { font-size: 1.1rem; }
      .grid { grid-template-columns: 1fr; }
      /* 手機：隱藏右側漸層（改用漢堡選單不需要）、關掉橫向捲動 */
      .cat-nav::after { display: none; }
      .cat-menu-toggle {
        display: flex; width: 100%; align-items: center; justify-content: space-between;
        background: var(--coffee-mid); color: #fff; border: none;
        padding: 0.85rem 1rem; cursor: pointer; font-family: inherit;
        font-size: 0.95rem; font-weight: 500;
      }
      .cat-menu-toggle .cat-menu-icon { font-size: 1.3rem; transition: transform .2s; }
      .cat-nav.open .cat-menu-toggle .cat-menu-icon { transform: rotate(90deg); }
      .cat-nav-inner {
        display: none; flex-direction: column; padding: 0;
        overflow: visible; max-height: 70vh; overflow-y: auto;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .cat-nav.open .cat-nav-inner { display: flex; }
      .cat-nav-inner .cat-btn {
        width: 100%; text-align: left; padding: 0.9rem 1.25rem;
        font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.06);
        border-left: 3px solid transparent;
      }
      .cat-nav-inner .cat-btn.active {
        border-bottom-color: rgba(255,255,255,0.06);
        border-left-color: var(--coffee-light);
        background: rgba(255,255,255,0.06);
      }
    }
  </style>
</head>

<script>
const CAT_LABELS = {
  all: '全部文章', news: '📢 最新消息', knowledge: '📖 咖啡小學堂',
  events: '🎪 咖啡活動', map: '🗺️ 咖啡地圖', kol: '⭐ 達人實測', cbtj: '🧪 CBTJ'
};
const PAGE_SIZE = 9;
let articles = [];
let currentCat = 'all';
let searchQuery = '';
let currentPage = 1;

// ── Load ──
(async () => {
  const res = await fetch('/article_list.json');
  articles = await res.json();

  // Parse ?cat= from URL
  const params = new URLSearchParams(location.search);
  const urlCat = params.get('cat');
  if (urlCat && CAT_LABELS[urlCat]) {
    currentCat = urlCat;
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === urlCat);
    });
    document.getElementById('sectionLabel').textContent = CAT_LABELS[urlCat];
    // 同步手機漢堡選單顯示的當前分類
    const ml = document.getElementById('catMenuLabel');
    if (ml) ml.textContent = CAT_LABELS[urlCat];
  }

  render();
})();

// ── Category tab ──
const catNav = document.getElementById('catNav');
const catMenuToggle = document.getElementById('catMenuToggle');
const catMenuLabel = document.getElementById('catMenuLabel');

// 手機漢堡選單開關
catMenuToggle.addEventListener('click', e => {
  e.stopPropagation();
  const opened = catNav.classList.toggle('open');
  catMenuToggle.setAttribute('aria-expanded', opened ? 'true' : 'false');
});
// 點選單外關閉
document.addEventListener('click', e => {
  if (catNav.classList.contains('open') && !catNav.contains(e.target)) {
    catNav.classList.remove('open');
    catMenuToggle.setAttribute('aria-expanded', 'false');
  }
});
// Esc 關閉
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && catNav.classList.contains('open')) {
    catNav.classList.remove('open');
    catMenuToggle.setAttribute('aria-expanded', 'false');
  }
});

catNav.addEventListener('click', e => {
  // 外連（<a>）讓瀏覽器自然處理，不觸發過濾
  if (e.target.classList.contains('cat-link')) return;
  if (e.target.classList.contains('cat-btn') && e.target.dataset.cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    currentPage = 1;
    document.getElementById('sectionLabel').textContent = CAT_LABELS[currentCat];
    if (catMenuLabel) catMenuLabel.textContent = CAT_LABELS[currentCat];
    // 選完自動關閉手機漢堡選單
    catNav.classList.remove('open');
    catMenuToggle.setAttribute('aria-expanded', 'false');
    // Update URL
    const url = new URL(location);
    if (currentCat === 'all') { url.searchParams.delete('cat'); }
    else { url.searchParams.set('cat', currentCat); }
    history.replaceState(null, '', url);
    render();
  }
});

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  currentPage = 1;
  render();
});

function hasCategory(a, cat) {
  if (!a.category) return false;
  if (Array.isArray(a.category)) return a.category.includes(cat);
  return a.category === cat;
}

function primaryCategory(a) {
  if (!a.category) return '';
  if (Array.isArray(a.category)) return a.category[0] || '';
  return a.category;
}

function getFiltered() {
  return articles.filter(a => {
    const matchCat = currentCat === 'all' || hasCategory(a, currentCat);
    const q = searchQuery;
    const matchSearch = !q ||
      a.title.toLowerCase().includes(q) ||
      (Array.isArray(a.tags) ? a.tags.join(' ') : (a.tags || '')).toLowerCase().includes(q) ||
      (a.description || a.excerpt || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function catClass(cat) { return 'cat-' + (cat || 'knowledge'); }
function catLabel(cat) {
  return {news:'最新消息',knowledge:'咖啡小學堂',events:'咖啡活動',map:'咖啡地圖',kol:'達人實測',cbtj:'CBTJ'}[cat] || cat || '';
}

function isExternal(a) {
  const url = a.url || a.link || '';
  return url.startsWith('http') && !url.includes('dailycoffee.matrix.com.tw');
}

function getCardHref(a) {
  if (isExternal(a)) return a.url || a.link || '#';
  return '/article/' + encodeURIComponent(a.slug) + '/';
}

function getImgSrc(a) {
  return a.hero || a.image || '';
}

function getTags(a) {
  const tags = Array.isArray(a.tags) ? a.tags : [];
  return tags.slice(0, 4);
}

function renderPagination(totalItems) {
  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹</button>`;

  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  for (const p of pages) {
    if (p === '...') { html += '<span class="page-ellipsis">…</span>'; continue; }
    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }

  html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">›</button>`;
  pag.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const grid = document.getElementById('articleGrid');
  const filtered = getFiltered();
  document.getElementById('articleCount').textContent = filtered.length + ' 篇';

  const countEl = document.getElementById('search-results-count');
  countEl.textContent = searchQuery ? `找到 ${filtered.length} 篇「${searchQuery}」相關文章` : '';

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  renderPagination(filtered.length);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="card-empty"><div class="icon">☕</div><p>這個分類還沒有文章</p><p style="font-size:0.85rem;color:#ccc;margin-top:0.5rem;">敬請期待即將推出的內容</p></div>`;
    return;
  }

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  grid.innerHTML = pageItems.map(a => {
    const href = getCardHref(a);
    const ext = isExternal(a);
    const img = getImgSrc(a);
    const tags = getTags(a);
    const tagsHtml = tags.map(t => `<span class="card-tag">${t}</span>`).join('');
    return `<article class="card">
      <a href="${href}" ${ext ? 'target="_blank" rel="noopener noreferrer"' : ''}>
        <div class="card-img-wrap">
          <img src="${img}" alt="${a.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=70'">
          ${ext ? '<span class="ext-badge">↗ 外部</span>' : ''}
        </div>
      </a>
      <div class="card-body">
        ${a.category ? (function(){
          const cats = Array.isArray(a.category) ? a.category : [a.category];
          // 過濾某分類時：只顯示該分類（強調關聯性）
          // 全部文章時：顯示所有分類（讓使用者看到多分類歸屬）
          const showList = (currentCat !== 'all' && cats.includes(currentCat)) ? [currentCat] : cats;
          return `<div class="cat-tags">${showList.map(c => `<span class="cat-tag ${catClass(c)}">${catLabel(c)}</span>`).join('')}</div>`;
        })() : ''}
        <h2><a href="${href}" ${ext ? 'target="_blank" rel="noopener noreferrer"' : ''}>${a.title}</a></h2>
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-meta">
          <time>${a.date || ''}</time>
        </div>
      </div>
    </article>`;
  }).join('');
}
</script>
</body>
</html>
