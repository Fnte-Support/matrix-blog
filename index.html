<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Coffee | Matrix 咖啡專欄</title>
  <meta name="description" content="每日咖啡美學探索：產區知識、沖煮技巧、咖啡活動、全球咖啡店地圖，與咖啡人一起成長。">
  <style>
    :root {
      --coffee-dark: #2C1810;
      --coffee-mid: #6B4226;
      --coffee-light: #C07A3E;
      --coffee-cream: #F5EDE0;
      --coffee-bg: #FDFBF8;
      --gray-light: #f0ede8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--coffee-bg); color: var(--coffee-dark); line-height: 1.6; }

    /* ── Header ── */
    header { background: var(--coffee-dark); color: #fff; padding: 0; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .site-logo { font-size: 1.3rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.5px; }
    .site-logo span { color: var(--coffee-light); }

    /* ── Category Nav ── */
    .cat-nav { background: var(--coffee-mid); overflow-x: auto; scrollbar-width: none; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; padding: 0 1.5rem; gap: 0; }
    .cat-btn { flex-shrink: 0; padding: 0.75rem 1.2rem; color: rgba(255,255,255,0.75); font-size: 0.9rem; font-weight: 500; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
    .cat-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .cat-btn.active { color: #fff; border-bottom-color: var(--coffee-light); font-weight: 600; }

    /* ── Search Bar ── */
    .search-bar { max-width: 1200px; margin: 1.5rem auto 0; padding: 0 1.5rem; }
    .search-wrap { position: relative; max-width: 560px; margin: 0 auto; }
    .search-wrap input { width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border: 2px solid var(--gray-light); border-radius: 12px; font-size: 1rem; background: #fff; outline: none; transition: border-color .2s; }
    .search-wrap input:focus { border-color: var(--coffee-light); }
    .search-wrap .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.5; }
    #search-results-count { text-align: center; font-size: 0.85rem; color: #888; margin-top: 0.5rem; min-height: 1.2em; }

    /* ── Main Grid ── */
    main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
    .section-title { font-size: 1.1rem; font-weight: 600; color: var(--coffee-mid); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--gray-light); display: flex; align-items: center; justify-content: space-between; }
    .section-title .count { font-weight: 400; color: #aaa; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); transition: box-shadow .2s, transform .2s; display: flex; flex-direction: column; }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.13); transform: translateY(-2px); }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .card-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
    .card .cat-tag { display: inline-block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 0.5rem; align-self: flex-start; }
    .cat-news { background: #FFF3E0; color: #E65100; }
    .cat-knowledge { background: #E8F5E9; color: #2E7D32; }
    .cat-events { background: #E3F2FD; color: #1565C0; }
    .cat-map { background: #F3E5F5; color: #6A1B9A; }
    .cat-kol { background: #FFEBEE; color: #C62828; }
    .cat-cbtj { background: #FFF8E1; color: #F57F17; }
    .card-body h2 { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; flex: 1; }
    .card-body h2 a { color: var(--coffee-dark); text-decoration: none; }
    .card-body h2 a:hover { color: var(--coffee-light); }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.5rem 0 0.25rem; }
    .card-tags .kw { display: inline-block; font-size: 0.72rem; color: var(--coffee-mid); background: var(--coffee-cream); padding: 0.15rem 0.55rem; border-radius: 12px; line-height: 1.4; }
    /* ── Pagination ── */
    .pager { display: flex; justify-content: center; align-items: center; gap: 0.3rem; margin-top: 2.5rem; flex-wrap: wrap; }
    .pager button { padding: 0.45rem 0.8rem; border: 1px solid var(--gray-light); background: #fff; color: var(--coffee-mid); border-radius: 8px; cursor: pointer; font-size: 0.9rem; min-width: 38px; transition: all .2s; font-weight: 500; }
    .pager button:hover:not(:disabled) { background: var(--coffee-cream); border-color: var(--coffee-light); }
    .pager button.active { background: var(--coffee-mid); color: #fff; border-color: var(--coffee-mid); }
    .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pager .ellipsis { padding: 0.4rem 0.3rem; color: #aaa; font-size: 0.9rem; }
    .pager-info { text-align: center; color: #aaa; font-size: 0.8rem; margin-top: 0.75rem; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-top: auto; padding-top: 0.5rem; }
    .card-meta time {}
    .card-meta .ext { font-size: 0.72rem; color: #bbb; }
    .card-empty { grid-column: 1/-1; text-align: center; padding: 4rem 0; color: #bbb; }
    .card-empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ── Footer ── */
    footer { background: var(--coffee-dark); color: rgba(255,255,255,0.6); font-size: 0.88rem; margin-top: 3rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem 1.5rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    .footer-col h4 { color: var(--coffee-light); font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
    .footer-col ul { list-style: none; padding: 0; margin: 0; }
    .footer-col li { margin-bottom: 0.5rem; }
    .footer-col a { color: rgba(255,255,255,0.7); text-decoration: none; transition: color .2s; }
    .footer-col a:hover { color: var(--coffee-light); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding: 1.2rem 1.5rem 1.5rem; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.5); }
    .footer-bottom a { color: rgba(255,255,255,0.6); text-decoration: none; }
    .footer-bottom a:hover { color: var(--coffee-light); }
    .footer-meta { margin-top: 0.4rem; font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .footer-meta a { color: rgba(255,255,255,0.4); margin: 0 0.4rem; }
    @media (max-width: 640px) { .footer-inner { grid-template-columns: 1fr; gap: 1.5rem; } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-inner { height: 56px; }
      .site-logo { font-size: 1.1rem; }
      .cat-btn { padding: 0.65rem 0.9rem; font-size: 0.82rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="site-logo">☕ Daily <span>Coffee</span></a>
  </div>
</header>

<nav class="cat-nav" id="catNav">
  <div class="cat-nav-inner">
    <button class="cat-btn active" data-cat="all">全部文章</button>
    <button class="cat-btn" data-cat="news">📢 最新消息</button>
    <button class="cat-btn" data-cat="knowledge">📖 咖啡小學堂</button>
    <button class="cat-btn" data-cat="events">🎪 咖啡活動</button>
    <button class="cat-btn" data-cat="map">🗺️ 咖啡地圖</button>
    <button class="cat-btn" data-cat="kol">⭐ 達人實測</button>
    <button class="cat-btn" data-cat="cbtj">🧪 CBTJ</button>
  </div>
</nav>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋文章標題或關鍵字…" autocomplete="off">
  </div>
  <div id="search-results-count"></div>
</div>

<main>
  <div class="section-title">
    <span id="sectionLabel">全部文章</span>
    <span class="count" id="articleCount">—</span>
  </div>
  <div class="grid" id="articleGrid"></div>
  <nav class="pager" id="pager" aria-label="分頁導航"></nav>
  <div class="pager-info" id="pagerInfo"></div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-col">
      <h4>分類</h4>
      <ul>
        <li><a href="/?cat=news">📢 最新消息</a></li>
        <li><a href="/?cat=knowledge">📖 咖啡小學堂</a></li>
        <li><a href="/?cat=events">🎪 咖啡活動</a></li>
        <li><a href="/?cat=map">🗺️ 咖啡地圖</a></li>
        <li><a href="/?cat=kol">⭐ 達人實測</a></li>
        <li><a href="/?cat=cbtj">🧪 CBTJ</a></li>
      </ul>
    </div>
    <div class="footer-col">
      <h4>關於</h4>
      <ul>
        <li><a href="https://www.matrix.com.tw/about-us" target="_blank" rel="noopener">關於我們</a></li>
        <li><a href="https://www.matrix.com.tw/contact" target="_blank" rel="noopener">聯絡我們</a></li>
        <li><a href="https://www.matrix.com.tw" target="_blank" rel="noopener">Matrix 官網</a></li>
      </ul>
    </div>
    <div class="footer-col">
      <h4>社群</h4>
      <ul>
        <li><a href="https://www.matrix.com.tw/threads" target="_blank" rel="noopener">Threads</a></li>
        <li><a href="https://www.matrix.com.tw/instagram" target="_blank" rel="noopener">Instagram</a></li>
        <li><a href="https://www.matrix.com.tw/facebook" target="_blank" rel="noopener">Facebook</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <p>© 2026 Daily Coffee · Matrix 咖啡專欄 · <a href="https://dailycoffee.matrix.com.tw">dailycoffee.matrix.com.tw</a></p>
    <p class="footer-meta"><a href="/sitemap.xml">sitemap</a>·<a href="/robots.txt">robots</a></p>
  </div>
</footer>

<script>
const CAT_LABELS = {
  all: '全部文章', news: '📢 最新消息', knowledge: '📖 咖啡小學堂',
  events: '🎪 咖啡活動', map: '🗺️ 咖啡地圖', kol: '⭐ 達人實測', cbtj: '🧪 CBTJ'
};

const PAGE_SIZE = 9;
let articles = [];
let currentCat = 'all';
let searchQuery = '';
let currentPage = 1;

// ── Load article list ──
(async () => {
  // Apply ?cat= URL parameter on load
  const params = new URLSearchParams(location.search);
  const catParam = params.get('cat');
  if (catParam && CAT_LABELS[catParam]) {
    currentCat = catParam;
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === catParam);
    });
    document.getElementById('sectionLabel').textContent = CAT_LABELS[catParam];
  }
  const res = await fetch('/article_list.json');
  articles = await res.json();
  render();
})();

// ── Category tab ──
document.getElementById('catNav').addEventListener('click', e => {
  if (e.target.classList.contains('cat-btn')) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    document.getElementById('sectionLabel').textContent = CAT_LABELS[currentCat];
    currentPage = 1;
    render();
  }
});

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  currentPage = 1;
  render();
});

// ── Pagination click ──
document.getElementById('pager').addEventListener('click', e => {
  const btn = e.target.closest('button[data-page]');
  if (!btn || btn.disabled) return;
  currentPage = Number(btn.dataset.page);
  render();
  document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

function tagsText(t) {
  if (!t) return '';
  if (Array.isArray(t)) return t.join(' ');
  return String(t);
}

function getFiltered() {
  return articles.filter(a => {
    const matchCat = currentCat === 'all' || a.category === currentCat;
    const q = searchQuery;
    const matchSearch = !q ||
      a.title.toLowerCase().includes(q) ||
      tagsText(a.tags).toLowerCase().includes(q) ||
      (a.description || a.excerpt || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function catClass(cat) { return 'cat-' + (cat || 'knowledge'); }
function catLabel(cat) {
  return {news:'最新消息',knowledge:'咖啡小學堂',events:'咖啡活動',map:'咖啡地圖',kol:'達人實測',cbtj:'CBTJ'}[cat] || cat || '';
}

function renderPager(totalPages) {
  const pager = document.getElementById('pager');
  const info = document.getElementById('pagerInfo');
  if (totalPages <= 1) {
    pager.innerHTML = '';
    info.textContent = '';
    return;
  }
  const p = currentPage;
  const btn = (n, label, opts = {}) => `<button data-page="${n}" ${opts.disabled ? 'disabled' : ''} ${opts.active ? 'class="active"' : ''} aria-label="${label}">${opts.text || n}</button>`;
  const parts = [];
  parts.push(btn(p - 1, '上一頁', { disabled: p <= 1, text: '‹' }));
  // Generate page numbers with ellipsis
  const pages = new Set([1, totalPages, p, p - 1, p + 1]);
  const sorted = [...pages].filter(n => n >= 1 && n <= totalPages).sort((a, b) => a - b);
  let prev = 0;
  for (const n of sorted) {
    if (n - prev > 1) parts.push('<span class="ellipsis">…</span>');
    parts.push(btn(n, `第 ${n} 頁`, { active: n === p }));
    prev = n;
  }
  parts.push(btn(p + 1, '下一頁', { disabled: p >= totalPages, text: '›' }));
  pager.innerHTML = parts.join('');
  info.textContent = `第 ${p} / ${totalPages} 頁`;
}

function render() {
  const grid = document.getElementById('articleGrid');
  const filtered = getFiltered();
  document.getElementById('articleCount').textContent = filtered.length + ' 篇';

  const countEl = document.getElementById('search-results-count');
  if (searchQuery) {
    countEl.textContent = searchQuery ? `找到 ${filtered.length} 篇「${searchQuery}」相關文章` : '';
  } else {
    countEl.textContent = '';
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="card-empty"><div class="icon">☕</div><p>這個分類還沒有文章</p><p style="font-size:0.85rem;color:#ccc;margin-top:0.5rem;">敬請期待即將推出的內容</p></div>`;
    document.getElementById('pager').innerHTML = '';
    document.getElementById('pagerInfo').textContent = '';
    return;
  }

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  grid.innerHTML = pageItems.map(a => {
    const href = a.url || '/article/' + encodeURIComponent(a.slug);
    const isExternal = a.source === 'external' || /^https?:\/\//.test(href);
    const linkAttrs = isExternal ? 'target="_blank" rel="noopener noreferrer"' : '';
    const tagList = Array.isArray(a.tags) ? a.tags : (a.tags ? String(a.tags).split(',') : []);
    const tagsHtml = tagList.slice(0, 4).map(t => `<span class="kw">${String(t).replace(/^"|"$/g, '').trim()}</span>`).join('');
    return `
    <article class="card">
      <a href="${href}" ${linkAttrs}>
        <img src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=70'">
      </a>
      <div class="card-body">
        ${a.category ? `<span class="cat-tag ${catClass(a.category)}">${catLabel(a.category)}</span>` : ''}
        <h2><a href="${href}" ${linkAttrs}>${a.title}</a></h2>
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-meta">
          <time>${a.date || ''}</time>
          ${isExternal ? '<span class="ext">↗ 外部連結</span>' : ''}
        </div>
      </div>
    </article>`;
  }).join('');

  renderPager(totalPages);
}
</script>
</body>
</html>
