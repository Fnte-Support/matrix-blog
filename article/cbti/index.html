<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>你是什麼樣的咖啡控？CBTI 咖啡人格測驗</title>
  <meta name="description" content="20道靈魂拷問，4個維度，16種咖啡人格。測驗結果可能引發咖啡信仰戰爭。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #1A0E08;
      --mid: #2C1810;
      --warm: #3E2215;
      --gold: #D4A574;
      --cream: #F5E6D3;
      --amber: #E8C07A;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(165deg, #1A0E08 0%, #2C1810 30%, #3E2215 55%, #1A0E08 100%);
      font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
      color: #F5E6D3;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      background-image: radial-gradient(circle at 25% 45%, #D4A574 1px, transparent 1px),
                        radial-gradient(circle at 75% 75%, #E8C07A 1px, transparent 1px);
      background-size: 50px 50px, 30px 30px;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes growIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes steam { 0% { opacity: 0; transform: translateY(0) scaleX(1); } 50% { opacity: .5; transform: translateY(-20px) scaleX(1.2); } 100% { opacity: 0; transform: translateY(-40px) scaleX(1); } }
    @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 20px 50px; position: relative; z-index: 1; }

    /* ── INTRO ── */
    .intro { text-align: center; padding-top: 8vh; animation: fadeInUp 0.8s ease; }
    .logo-wrap { position: relative; display: inline-block; margin-bottom: 8px; }
    .logo-emoji { font-size: 68px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 4px 12px rgba(212,165,116,.2)); }
    .steam-line { position: absolute; top: -10px; width: 2px; height: 30px; background: linear-gradient(to top, rgba(245,230,211,.25), rgba(212,165,116,.15)); border-radius: 50%; animation: steam 2.2s ease-in-out infinite; }
    .steam-line:nth-child(2) { left: calc(50% - 14px); animation-delay: 0s; }
    .steam-line:nth-child(3) { left: calc(50%); animation-delay: 0.6s; }
    .steam-line:nth-child(4) { left: calc(50% + 14px); animation-delay: 1.2s; }
    .intro-label { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; background: linear-gradient(90deg, #D4A574, #E8C07A, #D4A574); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 8s ease infinite; }
    .intro-sub { font-size: 10px; letter-spacing: 3px; color: rgba(212,165,116,.5); margin-bottom: 20px; }
    .intro-title { font-size: 28px; font-weight: 900; line-height: 1.5; margin-bottom: 10px; }
    .intro-title span { background: linear-gradient(90deg, #D4A574, #E8C07A, #D4A574); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease infinite; }
    .intro-desc { font-size: 14px; color: rgba(245,230,211,.45); line-height: 1.8; margin-bottom: 40px; }
    .intro-desc small { display: block; font-size: 12px; color: rgba(245,230,211,.3); margin-top: 4px; }
    .dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px; }
    .dim-card { background: rgba(212,165,116,.06); border: 1px solid rgba(212,165,116,.15); border-radius: 12px; padding: 14px 10px; animation: fadeInUp 0.6s ease both; }
    .dim-card-label { font-size: 13px; margin-bottom: 4px; }
    .dim-card-key { font-size: 11px; color: #D4A574; letter-spacing: 2px; font-weight: 500; }
    .start-btn { background: linear-gradient(135deg, #D4A574, #C08B5C); color: #1A0E08; border: none; border-radius: 50px; padding: 16px 56px; font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 30px rgba(212,165,116,.25); transition: all .3s ease; font-family: inherit; }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(212,165,116,.35); }

    /* ── QUIZ ── */
    .quiz-header { padding: 20px 0 8px; }
    .quiz-meta { display: flex; justify-content: space-between; align-items: center; }
    .quiz-dim-label { font-size: 11px; color: rgba(212,165,116,.5); letter-spacing: 1px; }
    .quiz-counter { font-size: 13px; color: #D4A574; font-weight: 700; }
    .quiz-counter span { color: rgba(212,165,116,.4); font-weight: 400; }
    .progress-bar { height: 3px; background: rgba(212,165,116,.08); border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #D4A574, #E8C07A); border-radius: 10px; transition: width 0.5s cubic-bezier(.25,.46,.45,.94); }
    .quiz-question-wrap { animation: slideIn 0.35s ease; padding-top: 24px; }
    .quiz-question { font-size: 21px; font-weight: 700; line-height: 1.6; margin-bottom: 24px; }
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn { background: rgba(212,165,116,.05); border: 1px solid rgba(212,165,116,.15); border-radius: 14px; padding: 15px 16px; font-size: 15px; color: #F5E6D3; text-align: left; line-height: 1.5; cursor: pointer; transition: all .25s cubic-bezier(.25,.46,.45,.94); font-family: inherit; animation: fadeInUp 0.3s ease both; position: relative; overflow: hidden; pointer-events: none; }
    .opt-btn.ready { pointer-events: auto; }
    .opt-btn:hover { transform: translateY(-2px); border-color: rgba(212,165,116,.35); }
    .opt-btn:active { transform: scale(.98); }
    .opt-btn.selected { border-color: #D4A574 !important; background: rgba(212,165,116,.18) !important; }
    .back-btn { display: block; margin: 18px auto 0; background: none; border: 1px solid rgba(212,165,116,.2); border-radius: 50px; padding: 9px 24px; font-size: 13px; color: rgba(212,165,116,.6); cursor: pointer; font-family: inherit; transition: all .25s ease; }
    .back-btn:hover { border-color: rgba(212,165,116,.5); color: #D4A574; }
    .back-btn.hidden { display: none; }

    /* ── RESULT ── */
    .result { animation: fadeInUp 0.8s ease; padding-top: 24px; }
    .result-header { text-align: center; margin-bottom: 26px; }
    .result-emoji { font-size: 60px; margin-bottom: 10px; animation: pulse 2s ease infinite; filter: drop-shadow(0 4px 24px rgba(212,165,116,.25)); }
    .result-type-badge { display: inline-block; background: rgba(212,165,116,.1); border: 1px solid rgba(212,165,116,.25); border-radius: 8px; padding: 5px 18px; font-size: 17px; font-weight: 900; letter-spacing: 5px; color: #D4A574; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
    .result-title { font-size: 25px; font-weight: 900; margin-bottom: 4px; line-height: 1.3; }
    .result-subtitle { font-size: 12px; color: rgba(212,165,116,.6); letter-spacing: 2px; font-style: italic; font-family: 'Playfair Display', serif; }
    .result-desc-box { background: rgba(212,165,116,.06); border: 1px solid rgba(212,165,116,.25); border-radius: 18px; padding: 22px 20px; margin-bottom: 16px; }
    .result-desc { font-size: 15px; line-height: 2; color: rgba(245,230,211,.85); font-weight: 300; }
    .result-match { background: linear-gradient(135deg, rgba(212,165,116,.1), rgba(212,165,116,.05)); border: 1px solid rgba(212,165,116,.15); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; }
    .result-match-label { font-size: 10px; color: #D4A574; letter-spacing: 3px; margin-bottom: 6px; font-weight: 600; }
    .result-match-text { font-size: 15px; font-weight: 700; line-height: 1.6; }
    .result-tip { background: rgba(232,192,122,.05); border: 1px solid rgba(232,192,122,.15); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; }
    .result-tip-label { font-size: 10px; color: #E8C07A; letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; }
    .result-tip-text { font-size: 14px; line-height: 1.8; color: rgba(245,230,211,.65); font-weight: 300; }
    .result-scores { background: rgba(212,165,116,.04); border: 1px solid rgba(212,165,116,.15); border-radius: 18px; padding: 20px 18px; margin-bottom: 28px; }
    .result-scores-label { font-size: 10px; color: #D4A574; letter-spacing: 3px; margin-bottom: 16px; font-weight: 600; }
    .score-row { margin-bottom: 18px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-labels { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 700; letter-spacing: .5px; }
    .score-bar { height: 10px; background: rgba(245,230,211,.08); border-radius: 10px; overflow: hidden; display: flex; box-shadow: inset 0 1px 2px rgba(0,0,0,.3); }
    .score-fill-a { height: 100%; border-radius: 10px 0 0 10px; animation: growIn 1s ease both; }
    .score-fill-b { height: 100%; border-radius: 0 10px 10px 0; animation: growIn 1s ease both; }
    .result-share { text-align: center; }
    .result-share p { font-size: 12px; color: rgba(245,230,211,.35); margin-bottom: 14px; }
    .restart-btn { -webkit-appearance: none; appearance: none; background: transparent; border: 1px solid rgba(212,165,116,.25); border-radius: 50px; padding: 13px 36px; font-size: 14px; color: #D4A574; cursor: pointer; font-family: inherit; letter-spacing: 2px; transition: all .3s ease; }
    .restart-btn:hover { background: rgba(212,165,116,.12) !important; }
    /* share buttons: inline styles only (Safari iOS compat) */
    .share-section-label { text-align: center; font-size: 12px; color: rgba(212,165,116,.55); letter-spacing: 2px; margin-bottom: 10px; font-weight: 500; }
    .result-footer { text-align: center; margin-top: 36px; padding-top: 16px; border-top: 1px solid rgba(212,165,116,.15); }
    .result-footer-text { font-size: 9px; color: rgba(212,165,116,.25); letter-spacing: 2px; }
    .counter-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(212,165,116,.08); border: 1px solid rgba(212,165,116,.2); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: rgba(212,165,116,.7); margin-bottom: 20px; }
    .counter-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #D4A574; animation: pulse 1.8s ease infinite; }

    /* ── 「這是別人的結果」banner ── */
    .shared-banner { background: linear-gradient(135deg, rgba(212,165,116,.18), rgba(232,192,122,.08)); border: 1px solid rgba(212,165,116,.35); border-radius: 14px; padding: 14px 18px; margin-bottom: 18px; text-align: center; animation: fadeInUp .6s ease; }
    .shared-banner-title { font-size: 13px; color: #E8C07A; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
    .shared-banner-text { font-size: 12px; color: rgba(245,230,211,.7); margin-bottom: 10px; line-height: 1.6; }
    .shared-banner-cta { display: inline-block; background: linear-gradient(135deg, #D4A574, #C08B5C); color: #1A0E08; border: none; border-radius: 50px; padding: 9px 24px; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; font-family: inherit; text-decoration: none; transition: all .3s ease; }
    .shared-banner-cta:hover { transform: translateY(-1px); filter: brightness(1.08); }

    /* ── 咖啡伴卡片（最佳 / 要當心）── */
    .compat-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .compat-card { background: rgba(212,165,116,.05); border: 1px solid rgba(212,165,116,.15); border-radius: 14px; padding: 14px 12px; position: relative; }
    .compat-card.best { border-color: rgba(232,192,122,.35); background: linear-gradient(135deg, rgba(232,192,122,.08), rgba(212,165,116,.04)); }
    .compat-card.worst { border-color: rgba(192,80,77,.25); background: linear-gradient(135deg, rgba(192,80,77,.08), rgba(212,165,116,.02)); }
    .compat-label { font-size: 9px; letter-spacing: 2px; margin-bottom: 8px; font-weight: 600; }
    .compat-card.best .compat-label { color: #E8C07A; }
    .compat-card.worst .compat-label { color: rgba(232,130,120,.7); }
    .compat-emoji { font-size: 32px; margin-bottom: 6px; }
    .compat-name { font-size: 13px; font-weight: 800; margin-bottom: 3px; line-height: 1.3; }
    .compat-type { font-size: 10px; color: rgba(212,165,116,.55); letter-spacing: 2px; font-family: 'Playfair Display', serif; margin-bottom: 8px; }
    .compat-desc { font-size: 11px; line-height: 1.6; color: rgba(245,230,211,.6); font-weight: 300; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .intro-title { font-size: 24px; }
      .quiz-question { font-size: 19px; }
      .opt-btn { font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ══ INTRO ══ -->
  <div id="intro-stage" class="intro">
    <div class="logo-wrap">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="logo-emoji">☕</div>
    </div>
    <h1 class="intro-label">咖啡人格測驗</h1>
    <p class="intro-sub">COFFEE PERSONALITY TEST</p>
    <h2 class="intro-title">你是什麼樣的<br><span>咖啡控？</span></h2>
    <div style="text-align:center; margin-bottom:28px">
      <div class="counter-badge">
        <span class="dot"></span>
        <span id="intro-counter-text">已有 0 人測驗</span>
      </div>
    </div>
    <p class="intro-desc">20道靈魂拷問 · 4個維度 · 16種人格<br><small>測驗結果可能引發咖啡信仰戰爭</small></p>
    <div class="dim-grid" id="dim-grid"></div>
    <button class="start-btn" id="start-btn">開始測驗</button>
    <div style="text-align:center;margin-top:24px;font-size:9px;color:rgba(212,165,116,.25);letter-spacing:2px;">v8</div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div id="quiz-stage" class="hidden">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="quiz-dim-label" id="quiz-dim-label"></span>
        <span class="quiz-counter"><span id="q-num">1</span><span>/20</span></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div id="question-wrap" class="quiz-question-wrap">
      <h2 class="quiz-question" id="question-text"></h2>
      <div class="options-list" id="options-list"></div>
      <button class="back-btn hidden" id="back-btn">← 上一題</button>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div id="result-stage" class="result hidden">
    <div id="shared-banner" class="shared-banner hidden">
      <div class="shared-banner-title">☕ 這是別人的咖啡人格</div>
      <div class="shared-banner-text">你朋友測出來的結果。你也想知道自己是什麼咖啡人嗎？</div>
      <button class="shared-banner-cta" id="shared-banner-cta">我也要測</button>
    </div>
    <div style="text-align:center; margin-bottom:10px">
      <div class="counter-badge">
        <span class="dot"></span>
        <span id="counter-text">已有 0 人測驗</span>
      </div>
    </div>
    <div class="result-header">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-type-badge" id="result-type"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-subtitle" id="result-subtitle"></p>
    </div>
    <div class="result-desc-box">
      <p class="result-desc" id="result-desc"></p>
    </div>
    <div class="result-match">
      <div class="result-match-label">你的經典款</div>
      <div class="result-match-text" id="result-match"></div>
    </div>
    <div class="result-tip">
      <div class="result-tip-label">給你的小建議</div>
      <div class="result-tip-text" id="result-tip"></div>
    </div>
    <div class="result-scores">
      <div class="result-scores-label">你的咖啡維度分數</div>
      <div id="scores-container"></div>
    </div>
    <div class="compat-section" id="compat-section">
      <div class="compat-card best">
        <div class="compat-label">☕ 最佳咖啡伴</div>
        <div class="compat-emoji" id="best-emoji"></div>
        <div class="compat-name" id="best-name"></div>
        <div class="compat-type" id="best-type"></div>
        <div class="compat-desc" id="best-desc"></div>
      </div>
      <div class="compat-card worst">
        <div class="compat-label">⚠️ 要當心</div>
        <div class="compat-emoji" id="worst-emoji"></div>
        <div class="compat-name" id="worst-name"></div>
        <div class="compat-type" id="worst-type"></div>
        <div class="compat-desc" id="worst-desc"></div>
      </div>
    </div>
    <div class="result-share">
      <div class="share-section-label">分享你的 CBTI 結果</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <button id="download-btn" style="padding:13px 8px;background:rgba(212,165,116,.18);border:1px solid rgba(212,165,116,.4);border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;color:#F5E6D3;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>📥</span> 下載到相簿
        </button>
        <button id="threads-share-btn" style="padding:13px 8px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>📸</span> Threads
        </button>
        <button id="instagram-share-btn" style="padding:13px 8px;background:linear-gradient(135deg,#FEDA75,#FA7E1E,#D62976,#962FBF,#4F5BD5);border:none;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;color:#fff;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>📷</span> Instagram
        </button>
        <button id="line-share-btn" style="padding:13px 8px;background:#06C755;border:none;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;color:#fff;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span>💬</span> LINE
        </button>
      </div>
      <button id="copy-btn" style="width:100%;padding:10px;margin-top:4px;background:transparent;border:1px solid rgba(212,165,116,.15);border-radius:10px;cursor:pointer;font-size:12px;color:rgba(245,230,211,.55);font-family:'Noto Sans TC',sans-serif;">🔗 複製文字與連結</button>
      <button class="restart-btn" id="restart-btn" style="margin-top:16px;">再測一次</button>
    </div>
    <div class="result-footer">
      <div class="result-footer-text">CBTI — Coffee Beverage Type Indicator · v6</div>
    </div>
  </div>

</div>

<script>
// ═══ DATA ═══
const QUESTIONS = [
  { id:1, dimension:0, question:"你覺得「抹茶拿鐵」算咖啡嗎？", options:[
    {text:"那是抹茶，不是咖啡，謝謝",score:3},{text:"勉強算⋯⋯但我不會點",score:1},
    {text:"好喝就好，誰在乎分類",score:-1},{text:"我連黑糖珍珠拿鐵都當咖啡喝",score:-3}]},
  { id:2, dimension:0, question:"朋友趁你不注意，在你的黑咖啡裡偷加了糖⋯⋯", options:[
    {text:"友誼的小船當場翻覆，沒有倖存者",score:3},{text:"表面微笑，內心已寫好絕交信",score:2},
    {text:"嚐一口⋯⋯嗯其實還行？",score:-1},{text:"終於有人懂我不敢自己加糖的心",score:-3}]},
  { id:3, dimension:0, question:"咖啡廳新品「草莓起司蛋糕風味拿鐵」上市了！", options:[
    {text:"咖啡豆的棺材板，被你們焊死了",score:3},{text:"不會喝，但會幫它拍遺照",score:0},
    {text:"聽起來有趣欸，來一杯",score:-2},{text:"再加一份草莓醬跟鮮奶油，多謝",score:-3}]},

// 取兩人格的配對（自動處理順序）；找不到就用 pattern 距離 fallback
function getCompat(a, b) {
  const hit = COMPAT_MATRIX.find(
    m => (m.a === a && m.b === b) || (m.a === b && m.b === a)
  );
  if (hit) return hit;
  // fallback: 計算兩個 type 字串有幾個維度相同，越多越速配
  let same = 0;
  for (let i = 0; i < 4; i++) if (a[i] === b[i]) same++;
  const score = same === 4 ? 5 : same === 3 ? 4 : same === 2 ? 3 : same === 1 ? 2 : 1;
  const label = score >= 4 ? "速配" : score === 3 ? "可聊" : score === 2 ? "有點距離" : "水火不容";
  return { a, b, score, desc: `咖啡觀 ${same}/4 維度吻合，${label}。` };
}

// 取某人格的最佳 / 最爛配對
function getBestWorst(typeKey) {
  const allKeys = Object.keys(TYPE_RESULTS).filter(k => k !== typeKey);
  let best = null, worst = null;
  for (const k of allKeys) {
    const c = getCompat(typeKey, k);
    const partnerKey = c.a === typeKey ? c.b : c.a;
    const entry = { key: partnerKey, score: c.score, desc: c.desc, type: TYPE_RESULTS[partnerKey] };
    if (!best || entry.score > best.score) best = entry;
    if (!worst || entry.score < worst.score) worst = entry;
  }
  return { best, worst };
}

// ═══ COUNTER（走 Vercel KV；失敗時走 fallback）═══
const COUNTER_LOCAL_KEY = 'cbti_count_cache';
const COUNTER_BASE = 3927;

function getFallbackCount() {
  const cached = parseInt(localStorage.getItem(COUNTER_LOCAL_KEY) || '0');
  if (cached >= COUNTER_BASE) return cached;
  const days = Math.max(0, Math.floor((Date.now() - new Date("2026-04-16").getTime()) / 86400000));
  return COUNTER_BASE + days * 7 + (days % 13);
}

async function fetchCount() {
  try {
    const r = await fetch('/api/count');
    if (!r.ok) throw new Error('count api non-ok');
    const data = await r.json();
    if (typeof data.count === 'number') {
      localStorage.setItem(COUNTER_LOCAL_KEY, String(data.count));
      return data.count;
    }
    throw new Error('bad payload');
  } catch (e) {
    return getFallbackCount();
  }
}

async function bumpCount() {
  try {
    const r = await fetch('/api/count', { method: 'POST' });
    if (!r.ok) throw new Error('count api non-ok');
    const data = await r.json();
    if (typeof data.count === 'number') {
      localStorage.setItem(COUNTER_LOCAL_KEY, String(data.count));
      return data.count;
    }
    throw new Error('bad payload');
  } catch (e) {
    const n = getFallbackCount() + 1;
    localStorage.setItem(COUNTER_LOCAL_KEY, String(n));
    return n;
  }
}

function formatCount(n) {
  return Number(n).toLocaleString('en-US');
}

function calculateResult(allAnswers) {
  // Each dimension has 5 questions, each scored -3 to +3
  // Positive scores = first letter (B/H/D/F), negative = second letter (L/C/S/E)
  const dimTotals = [0,0,0,0];
  allAnswers.forEach(({dimension, score}) => {
    dimTotals[dimension] += score;
  });
  // Max per dimension = 5 questions * 3 = 15 (if all answers score +3)
  // Score range: -15 to +15, so midpoint (0) = 50%, positive = first letter
  const dimLabels = [["B","L"],["H","C"],["D","S"],["F","E"]];
  let type = "";
  const dimScores = [];
  dimLabels.forEach((pair, i) => {
    const total = dimTotals[i]; // Range: -15 to +15
    const absMax = 15;
    const normalized = absMax > 0 ? total / absMax : 0; // -1 to +1
    const aPercent = Math.min(95, Math.max(5, Math.round((normalized + 1) / 2 * 100)));
    const bPercent = 100 - aPercent;
    type += aPercent >= 50 ? pair[0] : pair[1];
    dimScores.push({ a: pair[0], b: pair[1], aPercent, bPercent });
  });
  return { result: TYPE_RESULTS[type] || TYPE_RESULTS["BHDF"], dimScores };
}

        <div class="score-fill-b" style="width:${s.bPercent}%;background:linear-gradient(90deg,${DIMENSIONS[i].colors[1]},${DIMENSIONS[i].colors[1]});animation-delay:${.2+i*.15}s"></div>

// ═══ CANVAS roundRect polyfill（iOS 16 以前沒 native roundRect）═══
function ensureRoundRect(ctx) {
  if (ctx.roundRect) return;
  ctx.roundRect = function (x, y, w, h, r) {
    const rr = typeof r === 'number' ? [r, r, r, r] : r;
    this.beginPath();
    this.moveTo(x + rr[0], y);
    this.arcTo(x + w, y, x + w, y + h, rr[1]);
    this.arcTo(x + w, y + h, x, y + h, rr[2]);
    this.arcTo(x, y + h, x, y, rr[3]);
    this.arcTo(x, y, x + w, y, rr[0]);
    this.closePath();
  };
}

function wrapText(ctx, text, maxWidth) {
  const chars = text.split('');
  const lines = [];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ═══ 產生 1080×1350 分享圖 ═══
async function generateShareImage() {
  const type = window._resultType || 'CBTI';
  const title = window._resultTitle || '';
  const resultObj = TYPE_RESULTS[type];
  const emoji = resultObj?.emoji || '☕';
  const subtitle = resultObj?.subtitle || '';
  const match = window._resultMatch || '';
  const best = window._resultBest;
  const worst = window._resultWorst;

  const W = 1080, H = 1350;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ensureRoundRect(ctx);

  // 背景漸層（跟網頁一致）
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#1A0E08');
  bg.addColorStop(0.3, '#2C1810');
  bg.addColorStop(0.6, '#3E2215');
  bg.addColorStop(1, '#1A0E08');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 邊框
  ctx.strokeStyle = 'rgba(212,165,116,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, 40, W - 80, H - 80);

  ctx.textAlign = 'center';

  // Header
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#D4A574';
  ctx.fillText('C B T I', W / 2, 130);
  ctx.font = '300 18px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,165,116,0.55)';
  ctx.fillText('COFFEE  BREWING  TYPE  INDICATOR', W / 2, 162);

  // Emoji
  ctx.font = '200px serif';
  ctx.fillText(emoji, W / 2, 370);

  // Type badge
  ctx.font = '900 72px "Playfair Display", serif';
  const badgeW = ctx.measureText(type).width + 80;
  ctx.fillStyle = 'rgba(212,165,116,0.12)';
  ctx.strokeStyle = 'rgba(212,165,116,0.4)';
  ctx.lineWidth = 2;
  ctx.roundRect((W - badgeW) / 2, 420, badgeW, 90, 16);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#E8C07A';
  ctx.fillText(type, W / 2, 484);

  // Title
  ctx.font = '900 56px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#F5E6D3';
  ctx.fillText(title, W / 2, 582);

  // Subtitle
  ctx.font = 'italic 400 26px "Playfair Display", serif';
  ctx.fillStyle = 'rgba(212,165,116,0.7)';
  ctx.fillText(subtitle, W / 2, 620);

  // YOUR SOUL COFFEE
  ctx.font = '600 20px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#D4A574';
  ctx.fillText('— YOUR SOUL COFFEE —', W / 2, 700);
  ctx.font = '600 30px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#F5E6D3';
  ctx.font = '500 30px "Noto Sans TC", sans-serif';
  const matchLines = wrapText(ctx, match, 820);
  matchLines.slice(0, 2).forEach((line, i) => ctx.fillText(line, W / 2, 748 + i * 40));

  // Compat section header
  ctx.font = '700 24px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#D4A574';
  ctx.fillText('☕  咖啡人格配對  ☕', W / 2, 888);

  // 兩張並排配對卡片
  const cardY = 925;
  const cardH = 280;
  const cardW = 460;
  const gap = 30;
  const leftX = (W - cardW * 2 - gap) / 2;
  const rightX = leftX + cardW + gap;

  function drawCard(x, y, entry, isBest) {
    ctx.fillStyle = isBest ? 'rgba(232,192,122,0.1)' : 'rgba(192,80,77,0.1)';
    ctx.strokeStyle = isBest ? 'rgba(232,192,122,0.45)' : 'rgba(192,80,77,0.4)';
    ctx.lineWidth = 2;
    ctx.roundRect(x, y, cardW, cardH, 18);
    ctx.fill();
    ctx.stroke();

    const cx = x + cardW / 2;
    ctx.textAlign = 'center';
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    ctx.fillStyle = isBest ? '#E8C07A' : 'rgba(232,130,120,0.9)';
    ctx.fillText(isBest ? '☕ 最佳咖啡伴' : '⚠️ 要當心', cx, y + 40);

    ctx.font = '110px serif';
    ctx.fillStyle = '#F5E6D3';
    ctx.fillText(entry.type.emoji, cx, y + 158);

    ctx.font = '800 28px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#F5E6D3';
    ctx.fillText(entry.type.title, cx, y + 215);

    ctx.font = '600 16px "Playfair Display", serif';
    ctx.fillStyle = 'rgba(212,165,116,0.6)';
    ctx.fillText(entry.key, cx, y + 245);
  }

  drawCard(leftX, cardY, best, true);
  drawCard(rightX, cardY, worst, false);

  // Footer
  ctx.textAlign = 'center';
  ctx.font = '400 22px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,165,116,0.55)';
  ctx.fillText(SITE_URL.replace('https://', '') + '?r=' + type, W / 2, 1275);
  ctx.font = '300 16px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,165,116,0.3)';
  ctx.fillText('by Matrix Daily Coffee', W / 2, 1305);

  // 用 dataURL 給 <img>（handoff 教訓：blob URL 在 React 會被提早 revoke），
  // 保留 blob 給 navigator.share({files})
  const dataUrl = canvas.toDataURL('image/png');
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  return { dataUrl, blob };
}

async function ensureShareImage() {
  if (window._resultImage) return window._resultImage;

// ═══ 統一分享流程 ═══
async function shareVia(mode) {
  const type = window._resultType || 'CBTI';
  const title = window._resultTitle || '';
  const url = shareUrlFor(type);
  const shareText = '我是 #' + type + '「' + title + '」！20 道題目測出你的咖啡人格，你是哪一型？';

  let img;
  try { img = await ensureShareImage(); }
  catch (e) { console.error('generate image failed', e); }
  const file = img ? new File([img.blob], 'CBTI_' + type + '.png', { type: 'image/png' }) : null;

  // save = 儲存到相簿（空 text，iOS 跳原生面板讓使用者選「儲存影像」）
  if (mode === 'save') {
    if (file && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); return; }
      catch (err) { if (err.name === 'AbortError') return; }
    }
    if (img) {
      const a = document.createElement('a');
      a.download = 'CBTI_' + type + '.png';
      a.href = img.dataUrl;
      a.click();
    }
    return;
  }

  // 其他三種（share / line / threads）都走 navigator.share({files})，iOS 會跳 IG / Threads / LINE / Save 選擇器
  const payload = file
    ? { files: [file], text: shareText + '\n' + url, title }
    : { text: shareText + '\n' + url, title, url };

  if (navigator.share && (!file || (navigator.canShare && navigator.canShare({ files: [file] })))) {
    try { await navigator.share(payload); return; }
    catch (err) { if (err.name === 'AbortError') return; }
  }

  // 桌機 fallback：跳對應 web intent（IG 沒有桌機 intent → 改複製文字＋提示開 IG 貼文）
  if (mode === 'line') {
    window.open('https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(shareText), '_blank');
  } else if (mode === 'threads') {
    window.open('https://www.threads.net/intent/post?text=' + encodeURIComponent(shareText + ' ' + url), '_blank');
  } else if (mode === 'instagram') {
    try { await navigator.clipboard.writeText(shareText + '\n' + url); alert('文字已複製！IG 沒有網頁分享，請打開 Instagram App 貼上並附上剛下載的結果圖'); }
    catch (e) {}
  } else {
    try { await navigator.clipboard.writeText(shareText + '\n' + url); alert('分享文字已複製，可直接貼到想發的地方'); }
    catch (e) {}
  }
}

  if (!typeKey) return;

})();
