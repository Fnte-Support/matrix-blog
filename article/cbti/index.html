<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #1A0E08;
      --mid: #2C1810;
      --warm: #3E2215;
      --gold: #D4A574;
      --cream: #F5E6D3;
      --amber: #E8C07A;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(165deg, #1A0E08 0%, #2C1810 30%, #3E2215 55%, #1A0E08 100%);
      font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
      color: #F5E6D3;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      background-image: radial-gradient(circle at 25% 45%, #D4A574 1px, transparent 1px),
                        radial-gradient(circle at 75% 75%, #E8C07A 1px, transparent 1px);
      background-size: 50px 50px, 30px 30px;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes growIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes steam { 0% { opacity: 0; transform: translateY(0) scaleX(1); } 50% { opacity: .5; transform: translateY(-20px) scaleX(1.2); } 100% { opacity: 0; transform: translateY(-40px) scaleX(1); } }
    @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }

    .container { max-width: 500px; margin: 0 auto; padding: 20px 20px 50px; position: relative; z-index: 1; }

    /* ── INTRO ── */
    .intro { text-align: center; padding-top: 8vh; animation: fadeInUp 0.8s ease; }
    .logo-wrap { position: relative; display: inline-block; margin-bottom: 8px; }
    .logo-emoji { font-size: 68px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 4px 12px rgba(212,165,116,.2)); }
    .steam-line { position: absolute; top: -10px; width: 2px; height: 30px; background: linear-gradient(to top, rgba(245,230,211,.25), rgba(212,165,116,.15)); border-radius: 50%; animation: steam 2.2s ease-in-out infinite; }
    .steam-line:nth-child(2) { left: calc(50% - 14px); animation-delay: 0s; }
    .steam-line:nth-child(3) { left: calc(50%); animation-delay: 0.6s; }
    .steam-line:nth-child(4) { left: calc(50% + 14px); animation-delay: 1.2s; }
    .intro-label { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 3px; margin-bottom: 4px; background: linear-gradient(90deg, #D4A574, #E8C07A, #D4A574); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 8s ease infinite; }
    .intro-sub { font-size: 10px; letter-spacing: 3px; color: rgba(212,165,116,.5); margin-bottom: 20px; }
    .intro-title { font-size: 28px; font-weight: 900; line-height: 1.5; margin-bottom: 10px; }
    .intro-title span { background: linear-gradient(90deg, #D4A574, #E8C07A, #D4A574); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease infinite; }
    .intro-desc { font-size: 14px; color: rgba(245,230,211,.45); line-height: 1.8; margin-bottom: 40px; }
    .intro-desc small { display: block; font-size: 12px; color: rgba(245,230,211,.3); margin-top: 4px; }
    .dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px; }
    .dim-card { background: rgba(212,165,116,.06); border: 1px solid rgba(212,165,116,.15); border-radius: 12px; padding: 14px 10px; animation: fadeInUp 0.6s ease both; }
    .dim-card-label { font-size: 13px; margin-bottom: 4px; }
    .dim-card-key { font-size: 11px; color: #D4A574; letter-spacing: 2px; font-weight: 500; }
    .start-btn { background: linear-gradient(135deg, #D4A574, #C08B5C); color: #1A0E08; border: none; border-radius: 50px; padding: 16px 56px; font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 30px rgba(212,165,116,.25); transition: all .3s ease; font-family: inherit; }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(212,165,116,.35); }

    /* ── QUIZ ── */
    .quiz-header { padding: 20px 0 8px; }

    .quiz-dim-label { font-size: 11px; color: rgba(212,165,116,.5); letter-spacing: 1px; }
    .quiz-counter { font-size: 13px; color: #D4A574; font-weight: 700; }
    .quiz-counter span { color: rgba(212,165,116,.4); font-weight: 400; }
    .progress-bar { height: 3px; background: rgba(212,165,116,.08); border-radius: 10px; overflow: hidden; margin: 12px 0; }

    .quiz-question { font-size: 21px; font-weight: 700; line-height: 1.6; margin-bottom: 24px; }

    .opt-btn:hover { transform: translateY(-2px); border-color: rgba(212,165,116,.35); }

    /* ── RESULT ── */
    .result { animation: fadeInUp 0.8s ease; padding-top: 24px; }
    .result-header { text-align: center; margin-bottom: 26px; }
    .result-emoji { font-size: 60px; margin-bottom: 10px; animation: pulse 2s ease infinite; filter: drop-shadow(0 4px 24px rgba(212,165,116,.25)); }
    .result-type-badge { display: inline-block; background: rgba(212,165,116,.1); border: 1px solid rgba(212,165,116,.25); border-radius: 8px; padding: 5px 18px; font-size: 17px; font-weight: 900; letter-spacing: 5px; color: #D4A574; margin-bottom: 10px; font-family: 'Playfair Display', serif; }
    .result-title { font-size: 25px; font-weight: 900; margin-bottom: 4px; line-height: 1.3; }
    .result-subtitle { font-size: 12px; color: rgba(212,165,116,.6); letter-spacing: 2px; font-style: italic; font-family: 'Playfair Display', serif; }
    .result-desc-box { background: rgba(212,165,116,.06); border: 1px solid rgba(212,165,116,.25); border-radius: 18px; padding: 22px 20px; margin-bottom: 16px; }
    .result-desc { font-size: 15px; line-height: 2; color: rgba(245,230,211,.85); font-weight: 300; }
    .result-match { background: linear-gradient(135deg, rgba(212,165,116,.1), rgba(212,165,116,.05)); border: 1px solid rgba(212,165,116,.15); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; }
    .result-match-label { font-size: 10px; color: #D4A574; letter-spacing: 3px; margin-bottom: 6px; font-weight: 600; }
    .result-match-text { font-size: 15px; font-weight: 700; line-height: 1.6; }
    .result-tip { background: rgba(232,192,122,.05); border: 1px solid rgba(232,192,122,.15); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; }
    .result-tip-label { font-size: 10px; color: #E8C07A; letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; }
    .result-tip-text { font-size: 14px; line-height: 1.8; color: rgba(245,230,211,.65); font-weight: 300; }
    .result-scores { background: rgba(212,165,116,.04); border: 1px solid rgba(212,165,116,.15); border-radius: 18px; padding: 20px 18px; margin-bottom: 28px; }
    .result-scores-label { font-size: 10px; color: #D4A574; letter-spacing: 3px; margin-bottom: 16px; font-weight: 600; }
    .score-row { margin-bottom: 16px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-labels { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
    .score-bar { height: 6px; background: rgba(245,230,211,.06); border-radius: 10px; overflow: hidden; display: flex; }
    .score-fill-a { height: 100%; border-radius: 10px 0 0 10px; animation: growIn 1s ease both; }
    .score-fill-b { height: 100%; border-radius: 0 10px 10px 0; animation: growIn 1s ease both; }
    .result-share { text-align: center; }
    .result-share p { font-size: 12px; color: rgba(245,230,211,.35); margin-bottom: 14px; }
    .restart-btn { background: transparent; border: 1px solid rgba(212,165,116,.25); border-radius: 50px; padding: 13px 36px; font-size: 14px; color: #D4A574; cursor: pointer; font-family: inherit; letter-spacing: 2px; transition: all .3s ease; }
    .restart-btn:hover { background: rgba(212,165,116,.12) !important; }
    .share-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .share-btn { display: flex; align-items: center; gap: 6px; padding: 11px 20px; border-radius: 50px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .25s ease; text-decoration: none; border: none; }
    .share-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .share-btn.line { background: #00B900; color: #fff; }
    .share-btn.threads { background: #000; color: #fff; border: 1px solid rgba(255,255,255,.3); }
    .share-btn.website { background: rgba(212,165,116,.15); color: #D4A574; border: 1px solid rgba(212,165,116,.3); }
    .share-btn svg { width: 16px; height: 16px; }
    .result-footer { text-align: center; margin-top: 36px; padding-top: 16px; border-top: 1px solid rgba(212,165,116,.15); }
    .result-footer-text { font-size: 9px; color: rgba(212,165,116,.25); letter-spacing: 2px; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .intro-title { font-size: 24px; }
      .quiz-question { font-size: 19px; }
      .opt-btn { font-size: 14px; }
    }
  </style>
</head>

// ═══ DATA ═══
const QUESTIONS = [

const DIMENSIONS = [
  { labels:["B 純粹派","L 調味派"], colors:["#2C1810","#D4A574"], keys:"B/L" },
  { labels:["H 熱飲派","C 冷飲派"], colors:["#C0392B","#2980B9"], keys:"H/C" },
  { labels:["D 深焙派","S 淺焙派"], colors:["#5D3A1A","#E8C07A"], keys:"D/S" },
  { labels:["F 固定派","E 探索派"], colors:["#5D4037","#FF8F00"], keys:"F/E" },
];

const DIM_LABELS = ["純粹 vs 調味","熱飲 vs 冷飲","深焙 vs 淺焙","固定 vs 探索"];

// ═══ STATE ═══
let currentQ = 0;
let answers = [];
let animating = false;
let selectedIdx = null;

// ═══ HELPERS ═══
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function calculateResult(allAnswers) {
  const dimTotals = [0,0,0,0];
  const dimCounts = [0,0,0,0];
  allAnswers.forEach(({dimension, score}) => {
    dimTotals[dimension] += score;
    dimCounts[dimension]++;
  });
  const dimLabels = [["B","L"],["H","C"],["D","S"],["F","E"]];
  let type = "";
  const dimScores = [];
  dimLabels.forEach((pair, i) => {
    const total = dimTotals[i];
    const maxPossible = dimCounts[i] * 3;
    const normalized = maxPossible > 0 ? total / maxPossible : 0;
    const aPercent = Math.min(95, Math.max(5, Math.round((normalized + 1) / 2 * 100)));
    const bPercent = 100 - aPercent;
    type += aPercent >= 50 ? pair[0] : pair[1];
    dimScores.push({ a: pair[0], b: pair[1], aPercent, bPercent });
  });
  return { result: TYPE_RESULTS[type] || TYPE_RESULTS["BHDF"], dimScores };
}

// ═══ RENDER FUNCTIONS ═══
function renderIntro() {
  const grid = document.getElementById('dim-grid');
  grid.innerHTML = DIMENSIONS.map((d, i) => `
    <div class="dim-card" style="animation-delay:${.2+i*.1}s">
      <div class="dim-card-label">${d.labels[0]} / ${d.labels[1]}</div>
      <div class="dim-card-key">${d.keys}</div>
    </div>`).join('');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('quiz-dim-label').textContent = DIM_LABELS[q.dimension];
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('options-list').innerHTML = q.options.map((opt, i) => `
    <button class="opt-btn" data-score="${opt.score}" data-dim="${q.dimension}" data-idx="${i}" style="animation-delay:${.03+i*.05}s">
      ${opt.text}
    </button>`).join('');
}

function renderResult(resultData) {
  const { result, dimScores } = resultData;
  window._resultType = result.type;
  window._resultTitle = result.title;
  document.getElementById('result-emoji').textContent = result.emoji;
  document.getElementById('result-type').textContent = result.type;
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-subtitle').textContent = result.subtitle;
  document.getElementById('result-desc').textContent = result.desc;
  document.getElementById('result-match').textContent = result.match;
  document.getElementById('result-tip').textContent = result.tip;
  // Update share URLs with real result
  const shareTitle = '我是#' + result.type + '「' + result.title + '」！咖啡人格測驗你也來測測看';
  const shareText = '20道題目測出你的咖啡人格，你是哪一型？';
  const lineBtn = document.getElementById('line-share-btn');
  if (lineBtn) lineBtn.href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(SHARE_URL) + '&text=' + encodeURIComponent(shareTitle);
  document.querySelectorAll('.share-btn.threads').forEach(b => b.href = 'https://www.threads.net/intent/post?text=' + encodeURIComponent(shareTitle + ' ' + SHARE_URL));

  document.getElementById('scores-container').innerHTML = dimScores.map((s, i) => `
    <div class="score-row">
      <div class="score-labels">
        <span style="color:${DIMENSIONS[i].colors[0]}">${s.a} ${s.aPercent}%</span>
        <span style="color:${DIMENSIONS[i].colors[1]}">${s.b} ${s.bPercent}%</span>
      </div>
      <div class="score-bar">
        <div class="score-fill-a" style="width:${s.aPercent}%;background:linear-gradient(90deg,${DIMENSIONS[i].colors[0]}cc,${DIMENSIONS[i].colors[0]});animation-delay:${.2+i*.15}s"></div>
        <div class="score-fill-b" style="width:${s.bPercent}%;background:linear-gradient(90deg,${DIMENSIONS[i].colors[1]},${DIMENSIONS[i].colors[1]});animation-delay:${.2+i*.15}s"></div>
      </div>
    </div>`).join('');
}

// ═══ EVENT HANDLERS ═══
document.getElementById('start-btn').addEventListener('click', () => {
  hide('intro-stage');
  show('quiz-stage');
  renderQuestion();
});

document.getElementById('options-list').addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if (!btn || animating) return;
  animating = true;
  const score = parseInt(btn.dataset.score);
  const dimension = parseInt(btn.dataset.dim);
  const idx = parseInt(btn.dataset.idx);
  btn.classList.add('selected');
  selectedIdx = idx;
  answers.push({ dimension, score });
  setTimeout(() => {
    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      const wrap = document.getElementById('question-wrap');
      wrap.style.animation = 'none';
      void wrap.offsetWidth;
      wrap.style.animation = 'slideIn 0.35s ease';
      renderQuestion();
    } else {
      const r = calculateResult(answers);
      hide('quiz-stage');
      show('result-stage');
      renderResult(r);
    }
    animating = false;
    selectedIdx = null;
  }, 350);
});

// ═══ SHARE ═══
const SHARE_URL = 'https://dailycoffee.matrix.com.tw/article/cbti/';
const SHARE_TITLE = '我是#' + (window._resultType || 'CBTI') + '！咖啡人格測驗你也來測測看';
const SHARE_TEXT = '20道題目測出你的咖啡人格，你是哪一型？';

// Show native share on mobile, hide generic share button
if (navigator.share) {
  document.getElementById('native-share-btn').style.display = 'flex';
  document.getElementById('native-share-btn').addEventListener('click', () => {
    navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL }).catch(() => {});
  });
}

// Update LINE share with dynamic message
const lineBtn = document.getElementById('line-share-btn');
if (lineBtn) {
  const lineUrl = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(SHARE_URL) + '&text=' + encodeURIComponent(SHARE_TITLE + ' ' + SHARE_TEXT);
  lineBtn.href = lineUrl;
}

// Update Threads share
const threadsBtns = document.querySelectorAll('.share-btn.threads');
threadsBtns.forEach(btn => {
  btn.href = 'https://www.threads.net/intent/post?text=' + encodeURIComponent(SHARE_TITLE + ' ' + SHARE_URL);
});

document.getElementById('restart-btn').addEventListener('click', () => {
  currentQ = 0;
  answers = [];
  animating = false;
  selectedIdx = null;
  hide('result-stage');
  show('intro-stage');
});

// Init
renderIntro();
</script>
